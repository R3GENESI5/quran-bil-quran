<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأسر الدلالية — Thematic Connections</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
    --bg: #faf6ef;
    --surface: #fff8f0;
    --text: #2c1810;
    --text-muted: #7a6553;
    --gold: #b8860b;
    --border: #e0d5c5;
    --panel-bg: #f7f1e8;
    --font-ar: 'Amiri', serif;
    --font-en: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--font-ar);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
}

.logo {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    text-decoration: none;
}

.header-title {
    font-family: var(--font-en);
    font-size: 0.85rem;
    color: var(--text-muted);
}

.back-link {
    font-family: var(--font-en);
    font-size: 0.85rem;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    transition: background 0.15s;
}
.back-link:hover { background: var(--panel-bg); }

.page-intro {
    text-align: center;
    padding: 32px 20px 0;
    max-width: 700px;
    margin: 0 auto;
}
.page-intro h1 {
    font-size: 1.8rem;
    color: var(--text);
    margin-bottom: 8px;
}
.page-intro p {
    font-family: var(--font-en);
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
}

#chart {
    display: flex;
    justify-content: center;
    padding: 20px;
}

#chart svg {
    max-width: 100%;
    height: auto;
}

#tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    font-size: 0.85rem;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    direction: rtl;
    max-width: 300px;
}
#tooltip.visible { opacity: 1; }

.tip-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
}
.tip-meaning {
    font-family: var(--font-en);
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    direction: ltr;
    text-align: left;
}
.tip-stat {
    font-family: var(--font-en);
    font-size: 0.75rem;
    color: var(--text);
}
.tip-chord-label {
    font-family: var(--font-en);
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
    direction: ltr;
    text-align: left;
}

#legend {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 24px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
}
.legend-chip {
    font-size: 0.8rem;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
.legend-chip:hover {
    border-color: var(--gold);
    background: rgba(184, 134, 11, 0.08);
}
.legend-chip .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: 5px;
    vertical-align: middle;
}

#loading {
    text-align: center;
    padding: 80px 20px;
    font-size: 1.4rem;
    color: var(--gold);
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
}

/* ── Detail Panel ──────────────────────────────── */
#detail-panel {
    position: fixed;
    top: 56px;
    right: 0;
    width: 420px;
    height: calc(100vh - 56px);
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    z-index: 90;
    direction: rtl;
}
#detail-panel.open { transform: translateX(0); }

.detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
}
.detail-header h3 { font-size: 1rem; color: var(--text-muted); }
.detail-close {
    width: 32px; height: 32px; border: none; background: none;
    font-size: 1.5rem; color: var(--text-muted); cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
}
.detail-close:hover { background: var(--panel-bg); }

.detail-body { padding: 18px; }

.detail-families {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.detail-fam-badge {
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.detail-arrow {
    font-size: 1.2rem;
    color: var(--text-muted);
}
.detail-meaning {
    font-family: var(--font-en);
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    direction: ltr;
}
.detail-roots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
}
.detail-root-chip {
    padding: 3px 10px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
}
.detail-root-chip:hover { border-color: var(--gold); background: rgba(184,134,11,0.08); }

.detail-section-title {
    font-family: var(--font-en);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    direction: ltr;
    text-align: left;
}
.detail-verse {
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--panel-bg);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
}
.detail-verse:hover { background: rgba(184,134,11,0.08); }
.detail-verse-key {
    font-family: var(--font-en);
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 2px;
    direction: ltr;
    display: inline-block;
}
.detail-verse-text {
    font-size: 1rem;
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.detail-count {
    font-family: var(--font-en);
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 12px;
}
.detail-show-more {
    display: block; width: 100%; padding: 8px;
    margin-top: 6px; background: var(--panel-bg);
    border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--font-ar); font-size: 0.85rem;
    color: var(--gold); cursor: pointer;
}
.detail-show-more:hover { background: rgba(184,134,11,0.08); }

/* ── Root Detail View ────────────────────────── */
.root-back-row { text-align: center; margin-bottom: 8px; }
.root-back-btn { width: auto; display: inline-block; margin-bottom: 12px; }
.root-letters {
    text-align: center; font-size: 2.6rem; font-weight: 700;
    color: var(--gold); letter-spacing: 4px; margin-bottom: 4px;
}
.root-buckwalter {
    text-align: center; font-family: var(--font-en); font-size: 0.85rem;
    color: var(--text-muted); margin-bottom: 12px; direction: ltr;
}
.root-meaning-box {
    font-family: var(--font-en); font-size: 0.9rem; line-height: 1.6;
    padding: 12px; background: var(--panel-bg); border-radius: 6px;
    margin-bottom: 12px; direction: ltr; text-align: left;
}
.root-families { text-align: center; margin-bottom: 16px; }

@media (max-width: 600px) {
    .page-intro h1 { font-size: 1.4rem; }
    .page-intro p { font-size: 0.8rem; }
    #chart { padding: 10px; }
    #detail-panel { width: 100vw; }
}
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">القرآن بالقرآن</a>
    <span class="header-title">Thematic Chord Diagram</span>
    <a href="index.html" class="back-link">← Reader</a>
</header>

<div class="page-intro">
    <h1>الأسر الدلالية</h1>
    <p>How Quranic themes interconnect. Each ribbon connects two semantic families
       that co-occur in the same verses — thicker ribbons mean stronger thematic pairing.</p>
</div>

<div id="loading">جارٍ التحميل...</div>
<div id="chart"></div>
<div id="legend"></div>
<div id="tooltip"></div>

<div id="detail-panel">
    <div class="detail-header">
        <h3 id="detail-title">التفاصيل</h3>
        <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
</div>

<script>
(async function() {
    // ── Load Data ──
    const [families, rootsIndex, versesText] = await Promise.all([
        fetch('data/families.json').then(r => r.json()),
        fetch('data/roots_index.json').then(r => r.json()),
        fetch('data/verses_text.json').then(r => r.json()),
    ]);

    // ── Build co-occurrence matrix ──
    const familyIds = Object.keys(families);
    const n = familyIds.length;
    const famIdx = {};
    familyIds.forEach((id, i) => famIdx[id] = i);

    // Map each verse to the set of families it touches
    const verseFams = {};
    for (const [root, data] of Object.entries(rootsIndex)) {
        if (!data.fam || data.fam.length === 0) continue;
        for (const vk of data.v) {
            if (!verseFams[vk]) verseFams[vk] = new Set();
            for (const f of data.fam) verseFams[vk].add(f);
        }
    }

    // Count per-family verse totals
    const famVerseCounts = new Array(n).fill(0);
    for (const fams of Object.values(verseFams)) {
        for (const f of fams) famVerseCounts[famIdx[f]]++;
    }

    // Build symmetric co-occurrence matrix
    const matrix = Array.from({length: n}, () => new Array(n).fill(0));
    for (const fams of Object.values(verseFams)) {
        const list = [...fams];
        for (let i = 0; i < list.length; i++) {
            for (let j = i + 1; j < list.length; j++) {
                const a = famIdx[list[i]], b = famIdx[list[j]];
                matrix[a][b]++;
                matrix[b][a]++;
            }
        }
    }

    // Add small diagonal so families with few cross-links still show
    for (let i = 0; i < n; i++) {
        const rowSum = matrix[i].reduce((a, b) => a + b, 0);
        matrix[i][i] = Math.max(rowSum * 0.15, 5);
    }

    // ── Color palette (warm earthy tones) ──
    const colorScale = d3.scaleOrdinal()
        .domain(familyIds)
        .range([
            '#b8860b','#8b6914','#a0522d','#cd853f','#d4a04a',
            '#4a7c5e','#6b8e5e','#2e7d6e','#5f9ea0','#4682b4',
            '#8b4513','#a0694b','#c4a35a','#bdb76b','#d2b48c',
            '#6a5acd','#7b68ae','#8b668b','#9e7c8d','#b07070',
            '#c0713d','#d4883e','#778899','#708090','#556b2f',
            '#8fbc8f','#bc8f8f','#cd5c5c','#e8967a','#daa520',
            '#b5651d','#9b7653','#7c6550','#a89070','#c9b896',
        ]);

    // ── D3 Chord Diagram ──
    const width = Math.min(900, window.innerWidth - 40);
    const height = width;
    const outerRadius = width / 2 - 100;
    const innerRadius = outerRadius - 20;

    const chord = d3.chord()
        .padAngle(0.03)
        .sortSubgroups(d3.descending)(matrix);

    const arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius);
    const ribbon = d3.ribbon().radius(innerRadius - 2);

    document.getElementById('loading').style.display = 'none';

    const svg = d3.select('#chart')
        .append('svg')
        .attr('viewBox', `0 0 ${width} ${height}`)
        .attr('width', width)
        .attr('height', height)
        .append('g')
        .attr('transform', `translate(${width/2},${height/2})`);

    const tooltip = document.getElementById('tooltip');

    function showTip(html, event) {
        tooltip.innerHTML = html;
        tooltip.classList.add('visible');
        const x = Math.min(event.clientX + 12, window.innerWidth - 320);
        const y = Math.min(event.clientY + 12, window.innerHeight - 150);
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
    }
    function hideTip() { tooltip.classList.remove('visible'); }

    // ── Draw ribbons ──
    const ribbons = svg.append('g')
        .selectAll('path')
        .data(chord.filter(d => d.source.index !== d.target.index))
        .join('path')
        .attr('d', ribbon)
        .attr('fill', d => colorScale(familyIds[d.source.index]))
        .attr('fill-opacity', 0.45)
        .attr('stroke', 'none')
        .on('mouseover', function(event, d) {
            d3.select(this).attr('fill-opacity', 0.85);
            const si = d.source.index, ti = d.target.index;
            const shared = matrix[si][ti];
            const fA = families[familyIds[si]], fB = families[familyIds[ti]];
            showTip(`
                <div class="tip-chord-label">
                    <strong>${fA.name_ar}</strong> ↔ <strong>${fB.name_ar}</strong><br>
                    ${shared} shared verses<br>
                    <span style="color:#7a6553">${fA.meaning}</span> ↔
                    <span style="color:#7a6553">${fB.meaning}</span>
                </div>
            `, event);
        })
        .on('mousemove', (event) => {
            const x = Math.min(event.clientX + 12, window.innerWidth - 320);
            const y = Math.min(event.clientY + 12, window.innerHeight - 150);
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        })
        .on('mouseout', function() {
            d3.select(this).attr('fill-opacity', 0.45);
            hideTip();
        });

    // ── Draw arcs ──
    const groups = svg.append('g')
        .selectAll('g')
        .data(chord.groups)
        .join('g');

    groups.append('path')
        .attr('d', arc)
        .attr('fill', d => colorScale(familyIds[d.index]))
        .attr('stroke', '#fff')
        .attr('stroke-width', 1)
        .style('cursor', 'pointer')
        .on('mouseover', function(event, d) {
            // Dim all ribbons except those connected to this group
            ribbons.attr('fill-opacity', r =>
                (r.source.index === d.index || r.target.index === d.index) ? 0.85 : 0.06
            );
            const fam = families[familyIds[d.index]];
            showTip(`
                <div class="tip-title">${fam.name_ar}</div>
                <div class="tip-meaning">${fam.meaning}</div>
                <div class="tip-stat">${fam.roots.length} roots · ${famVerseCounts[d.index]} verses</div>
            `, event);
        })
        .on('mousemove', (event) => {
            const x = Math.min(event.clientX + 12, window.innerWidth - 320);
            const y = Math.min(event.clientY + 12, window.innerHeight - 150);
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        })
        .on('mouseout', function() {
            ribbons.attr('fill-opacity', 0.45);
            hideTip();
        });

    // ── Labels ──
    groups.append('text')
        .each(d => { d.angle = (d.startAngle + d.endAngle) / 2; })
        .attr('dy', '0.35em')
        .attr('transform', d => {
            const angle = d.angle * 180 / Math.PI - 90;
            const flip = d.angle > Math.PI;
            return `rotate(${angle}) translate(${outerRadius + 10}) ${flip ? 'rotate(180)' : ''}`;
        })
        .attr('text-anchor', d => d.angle > Math.PI ? 'end' : 'start')
        .attr('font-family', 'Amiri, serif')
        .attr('font-size', '11px')
        .attr('fill', '#2c1810')
        .text(d => families[familyIds[d.index]].name_ar);

    // ── Legend ──
    const legend = document.getElementById('legend');
    familyIds.forEach((id, i) => {
        const chip = document.createElement('span');
        chip.className = 'legend-chip';
        chip.innerHTML = `<span class="dot" style="background:${colorScale(id)}"></span>${families[id].name_ar}`;
        chip.addEventListener('mouseenter', () => {
            ribbons.attr('fill-opacity', r =>
                (r.source.index === i || r.target.index === i) ? 0.85 : 0.06
            );
            groups.selectAll('path').attr('opacity', d =>
                d.index === i ? 1 : 0.3
            );
        });
        chip.addEventListener('mouseleave', () => {
            ribbons.attr('fill-opacity', 0.45);
            groups.selectAll('path').attr('opacity', 1);
        });
        chip.addEventListener('click', () => showFamilyDetail(i));
        legend.appendChild(chip);
    });

    // ── Detail Panel Logic ──
    const detailPanel = document.getElementById('detail-panel');
    const detailBody = document.getElementById('detail-body');
    const detailTitle = document.getElementById('detail-title');
    document.getElementById('detail-close').addEventListener('click', closeDetail);

    function closeDetail() {
        detailPanel.classList.remove('open');
        ribbons.attr('fill-opacity', 0.45);
        groups.selectAll('path').attr('opacity', 1);
    }

    // Build reverse map: family -> Set of verse keys
    const famVerseMap = {};
    familyIds.forEach(id => famVerseMap[id] = new Set());
    for (const [root, data] of Object.entries(rootsIndex)) {
        if (!data.fam) continue;
        for (const f of data.fam) {
            if (famVerseMap[f]) data.v.forEach(vk => famVerseMap[f].add(vk));
        }
    }

    function getSharedVerses(famA, famB) {
        const setA = famVerseMap[famA], setB = famVerseMap[famB];
        const shared = [];
        for (const vk of setA) { if (setB.has(vk)) shared.push(vk); }
        // Sort by surah:ayah
        shared.sort((a, b) => {
            const [sa, aa] = a.split(':').map(Number);
            const [sb, ab] = b.split(':').map(Number);
            return sa - sb || aa - ab;
        });
        return shared;
    }

    let _verseListId = 0;
    function renderVerseList(verses, limit) {
        const shown = verses.slice(0, limit);
        const verseHTML = vk => `
            <a class="detail-verse" href="index.html#${vk}" target="_blank">
                <div class="detail-verse-key">${vk}</div>
                <div class="detail-verse-text">${versesText[vk] || ''}</div>
            </a>`;
        let html = shown.map(verseHTML).join('');
        if (verses.length > limit) {
            const storeKey = `__verses_${++_verseListId}`;
            window[storeKey] = verses.map(verseHTML).join('');
            html += `<button class="detail-show-more" onclick="this.parentNode.innerHTML=window['${storeKey}']">
                عرض الكل (${verses.length})
            </button>`;
        }
        return html;
    }

    function showChordDetail(si, ti) {
        detailHistory = []; // reset history for new top-level view
        const idA = familyIds[si], idB = familyIds[ti];
        const fA = families[idA], fB = families[idB];
        const shared = getSharedVerses(idA, idB);
        const cA = colorScale(idA), cB = colorScale(idB);

        detailTitle.textContent = 'اتصال موضوعي';
        detailBody.innerHTML = `
            <div class="detail-families">
                <span class="detail-fam-badge" style="background:${cA}">${fA.name_ar}</span>
                <span class="detail-arrow">↔</span>
                <span class="detail-fam-badge" style="background:${cB}">${fB.name_ar}</span>
            </div>
            <div class="detail-meaning">${fA.meaning} ↔ ${fB.meaning}</div>
            <div class="detail-count">${shared.length} shared verses</div>
            <div class="detail-section-title">Roots — ${fA.name_ar}</div>
            <div class="detail-roots">${fA.roots.map(r =>
                `<span class="detail-root-chip">${r}</span>`).join('')}</div>
            <div class="detail-section-title">Roots — ${fB.name_ar}</div>
            <div class="detail-roots">${fB.roots.map(r =>
                `<span class="detail-root-chip">${r}</span>`).join('')}</div>
            <div class="detail-section-title">Shared Verses (${shared.length})</div>
            <div id="detail-verses">${renderVerseList(shared, 20)}</div>
        `;
        attachRootChipListeners();
        // Highlight the relevant ribbons
        ribbons.attr('fill-opacity', r =>
            (r.source.index === si && r.target.index === ti) ||
            (r.source.index === ti && r.target.index === si) ? 0.9 : 0.06
        );
        detailPanel.scrollTop = 0;
        detailPanel.classList.add('open');
    }

    function showFamilyDetail(idx) {
        detailHistory = []; // reset history for new top-level view
        const id = familyIds[idx];
        const fam = families[id];
        const c = colorScale(id);
        // Get top connections sorted by shared count
        const connections = [];
        for (let j = 0; j < n; j++) {
            if (j !== idx && matrix[idx][j] > 0) {
                connections.push({ idx: j, count: matrix[idx][j] });
            }
        }
        connections.sort((a, b) => b.count - a.count);

        detailTitle.textContent = fam.name_ar;
        detailBody.innerHTML = `
            <div class="detail-families">
                <span class="detail-fam-badge" style="background:${c}">${fam.name_ar}</span>
            </div>
            <div class="detail-meaning">${fam.meaning}</div>
            <div class="detail-count">${fam.roots.length} roots · ${famVerseCounts[idx]} verses</div>
            <div class="detail-section-title">Roots</div>
            <div class="detail-roots">${fam.roots.map(r =>
                `<span class="detail-root-chip">${r}</span>`).join('')}</div>
            <div class="detail-section-title">Top Connections</div>
            ${connections.slice(0, 10).map(c => {
                const cf = families[familyIds[c.idx]];
                return `<div class="detail-verse" style="cursor:pointer" data-a="${idx}" data-b="${c.idx}">
                    <div class="detail-verse-key">${c.count} shared verses</div>
                    <div class="detail-verse-text" style="font-size:0.9rem">${cf.name_ar} — ${cf.meaning}</div>
                </div>`;
            }).join('')}
        `;
        attachRootChipListeners();
        attachConnectionListeners();
        // Highlight
        ribbons.attr('fill-opacity', r =>
            (r.source.index === idx || r.target.index === idx) ? 0.85 : 0.06
        );
        groups.selectAll('path').attr('opacity', d => d.index === idx ? 1 : 0.3);
        detailPanel.scrollTop = 0;
        detailPanel.classList.add('open');
    }

    // ── Root Detail View ──
    let detailHistory = []; // stack for back navigation

    function showRootDetail(rootStr) {
        const data = rootsIndex[rootStr];
        if (!data) return;
        // Save current panel content + title for back navigation
        detailHistory.push({ html: detailBody.innerHTML, title: detailTitle.textContent });

        const famIds = data.fam || [];
        const famBadges = famIds.map(fid => {
            const f = families[fid];
            return f ? `<span class="detail-fam-badge" style="background:${colorScale(fid)};font-size:0.8rem;padding:4px 10px">${f.name_ar}</span>` : '';
        }).join(' ');

        detailTitle.textContent = rootStr;
        detailBody.innerHTML = `
            <div class="root-back-row">
                <button class="detail-show-more root-back-btn" id="root-back">→ رجوع</button>
            </div>
            <div class="root-letters">${rootStr.split('').join(' ')}</div>
            <div class="root-buckwalter">${data.b}</div>
            <div class="root-meaning-box">${data.m || 'No meaning available'}</div>
            <div class="detail-count">${data.f} verses across the Quran</div>
            ${famBadges ? `<div class="root-families">${famBadges}</div>` : ''}
            <div class="detail-section-title">Connected Verses (${data.v.length})</div>
            <div id="detail-verses">${renderVerseList(data.v, 30)}</div>
        `;
        document.getElementById('root-back').addEventListener('click', () => {
            if (detailHistory.length > 0) {
                const prev = detailHistory.pop();
                detailBody.innerHTML = prev.html;
                detailTitle.textContent = prev.title;
                attachRootChipListeners();
                attachConnectionListeners();
                detailPanel.scrollTop = 0;
            }
        });
        detailPanel.scrollTop = 0;
        detailPanel.classList.add('open');
    }

    function attachRootChipListeners() {
        detailBody.querySelectorAll('.detail-root-chip').forEach(chip => {
            chip.addEventListener('click', () => showRootDetail(chip.textContent.trim()));
        });
    }

    function attachConnectionListeners() {
        detailBody.querySelectorAll('[data-a]').forEach(el => {
            el.addEventListener('click', () => {
                showChordDetail(+el.dataset.a, +el.dataset.b);
            });
        });
    }

    // Attach click handlers to arcs
    groups.selectAll('path').on('click', function(event, d) {
        event.stopPropagation();
        showFamilyDetail(d.index);
    });

    // Attach click handlers to ribbons
    ribbons.on('click', function(event, d) {
        event.stopPropagation();
        showChordDetail(d.source.index, d.target.index);
    });

    // Click outside to close — use mousedown so it fires before innerHTML changes
    document.addEventListener('mousedown', (e) => {
        if (!detailPanel.contains(e.target) && detailPanel.classList.contains('open')) {
            closeDetail();
        }
    });

    // Escape key closes panel
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && detailPanel.classList.contains('open')) closeDetail();
    });

})();
</script>
</body>
</html>
